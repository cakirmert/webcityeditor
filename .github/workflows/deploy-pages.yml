name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build and publish static site
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Publish dist to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deploy_dir="$(mktemp -d)"
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$deploy_dir"
          find "$deploy_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. "$deploy_dir/"
          touch "$deploy_dir/.nojekyll"
          git -C "$deploy_dir" config user.name "github-actions[bot]"
          git -C "$deploy_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$deploy_dir" add .
          if git -C "$deploy_dir" diff --cached --quiet; then
            echo "No Pages changes to publish."
            exit 0
          fi
          git -C "$deploy_dir" commit -m "deploy: publish app"
          git -C "$deploy_dir" push origin HEAD:gh-pages
